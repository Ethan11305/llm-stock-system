services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: llm-stock-postgres
    environment:
      POSTGRES_DB: llm_stock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llm_stock"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/sql:/docker-entrypoint-initdb.d

  api:
    image: python:3.12-slim
    container_name: llm-stock-api
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    command: >
      sh -c "pip install -e . &&
      uvicorn llm_stock_system.