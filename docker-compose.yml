services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: llm-stock-postgres
    environment:
      POSTGRES_DB: llm_stock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/sql:/docker-entrypoint-initdb.d

  api:
    image: python:3.12-slim
    container_name: llm-stock-api
    depends_on:
      - postgres
    working_dir: /app
    command: >
      sh -c "pip install -e . &&
      uvicorn llm_stock_system.api.app:create_app --host 0.0.0.0 --port 8000 --factory"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

volumes:
  postgres_data:
