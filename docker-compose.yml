services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: llm-stock-postgres
    environment:
      POSTGRES_DB: llm_stock
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llm_stock"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/sql:/docker-entrypoint-initdb.d

  api:
    image: python:3.12-slim
    container_name: llm-stock-api
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    command: >
      sh -c "pip install -e . &&
      uvicorn llm_stock_system.api.app:create_app --host 0.0.0.0 --port 8000 --factory"
    env_file:
      - .env
    environment:
      # Inside Docker, the API must connect to the postgres service, not localhost.
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/llm_stock
      # During P0 verification, fail loudly instead of silently falling back to sample data.
      FALLBACK_TO_SAMPLE_DATA: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

volumes:
  postgres_data:
